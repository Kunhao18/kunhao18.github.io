<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Zhihao Wu</title>
<meta name="description" content="Zhihao Wu — PhD Student in Natural Language Processing at King's College London." />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>⚛️</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400;1,8..60,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  /* ---- Theme tokens (Direction A — classic academic serif) -------------- */
  :root {
    --bg: #fbf8f1;
    --fg: #1a1814;
    --muted: #6b6458;
    --rule: #d9d2c1;
    --subtle: #f2ede0;
    --accent: #8a5a2b;
    --mono: ui-monospace, "JetBrains Mono", Menlo, monospace;
  }
  html[data-theme="dark"] {
    --bg: #14130f;
    --fg: #e8e4d8;
    --muted: #8a8578;
    --rule: #2b2823;
    --subtle: #1c1a16;
    --accent: #c9a86a;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: "Source Serif 4", "Source Serif Pro", Charter, Georgia, serif;
    font-size: 15.5px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    transition: background .2s, color .2s;
  }
  a { color: var(--accent); }

  /* ---- Top bar ----------------------------------------------------------- */
  .topbar {
    border-bottom: 1px solid var(--rule);
    padding: 18px clamp(20px, 5vw, 72px);
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
  }
  .wordmark {
    font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--muted); display: flex; align-items: center; gap: 10px;
  }
  .wordmark .dot { width: 7px; height: 7px; border-radius: 7px; background: var(--accent); display: inline-block; }
  .topbar-right { display: flex; align-items: center; gap: 20px; }
  .site-nav { display: flex; gap: 20px; font-size: 13px; color: var(--muted); font-variant: small-caps; letter-spacing: 0.08em; }
  .site-nav a { color: var(--muted); text-decoration: none; }
  .site-nav a:hover { color: var(--fg); }
  .theme-toggle {
    background: transparent; border: 1px solid var(--rule); color: var(--muted);
    width: 30px; height: 30px; border-radius: 999px; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center; padding: 0;
  }
  .theme-toggle:hover { color: var(--fg); }

  /* ---- Main grid --------------------------------------------------------- */
  .site-main-grid {
    display: grid; grid-template-columns: 240px 1fr; gap: 56px;
    padding: 56px clamp(20px, 5vw, 72px) 80px;
    max-width: 1080px; margin: 0 auto;
  }
  .no-photo .site-main-grid { grid-template-columns: 1fr; }

  /* ---- Sidebar ----------------------------------------------------------- */
  .site-portrait {
    width: 200px; height: 240px; object-fit: cover; display: block;
    border: 1px solid var(--rule); background: var(--subtle);
  }
  .aside-address { margin-top: 22px; font-size: 13px; color: var(--muted); line-height: 1.7; }
  .aside-address .email { margin-top: 14px; }
  .aside-links {
    margin-top: 22px; border-top: 1px solid var(--rule); padding-top: 16px;
    display: flex; flex-direction: column; gap: 6px; font-size: 13px;
  }
  .aside-links a { color: var(--accent); text-decoration: none; }
  .aside-links a:hover { text-decoration: underline; }

  /* ---- Header / bio ------------------------------------------------------ */
  h1.name { font-weight: 400; font-size: clamp(40px, 5.2vw, 56px); margin: 0; letter-spacing: -0.02em; line-height: 1.05; }
  h1.name .last { font-style: italic; color: var(--accent); }
  .role { margin-top: 10px; color: var(--muted); font-size: 16px; display: flex; align-items: center; gap: 10px; }
  .role .tick { width: 20px; height: 1px; background: var(--accent); display: inline-block; }
  .bio p { margin: 0 0 14px; font-size: 16.5px; line-height: 1.75; max-width: 640px; text-wrap: pretty; }
  .bio { margin-top: 26px; margin-bottom: 40px; }
  .topic {
    color: var(--fg);
    background-image: linear-gradient(var(--accent), var(--accent));
    background-size: 100% 1.5px; background-repeat: no-repeat; background-position: 0 100%;
    padding-bottom: 1px;
  }

  /* ---- Sections ---------------------------------------------------------- */
  section.block { margin-top: 52px; padding-top: 28px; border-top: 1px solid var(--rule); }
  section.block > h2 {
    font-weight: 600; font-size: 13px; letter-spacing: 0.2em; text-transform: uppercase;
    margin: 0 0 22px; color: var(--fg);
  }

  /* ---- News -------------------------------------------------------------- */
  .news-row { display: grid; grid-template-columns: 90px 1fr; gap: 20px; padding: 8px 0; border-bottom: 1px dotted var(--rule); }
  .news-row .date { color: var(--muted); font-family: var(--mono); font-size: 12.5px; letter-spacing: 0.02em; padding-top: 2px; }
  .news-row .text { font-size: 15px; line-height: 1.6; text-wrap: pretty; }

  /* ---- Publications ------------------------------------------------------ */
  .year-block { display: grid; grid-template-columns: 90px 1fr; gap: 20px; margin-bottom: 24px; }
  .year-block .year { color: var(--muted); font-family: var(--mono); font-size: 12.5px; padding-top: 3px; }
  .year-block .pubs { display: flex; flex-direction: column; gap: 20px; }
  .pub .venue { font-size: 11.5px; color: var(--accent); letter-spacing: 0.14em; text-transform: uppercase; font-weight: 600; }
  .pub .title { font-size: 15.5px; margin-top: 4px; line-height: 1.4; text-wrap: pretty; }
  .pub .authors { font-size: 14px; margin-top: 4px; color: var(--fg); }
  .pub .authors u { text-decoration-thickness: 1px; text-underline-offset: 2px; }
  .pub .where { font-size: 13.5px; color: var(--muted); font-style: italic; margin-top: 2px; }
  .pub .links { margin-top: 6px; display: flex; gap: 10px; font-size: 12.5px; font-family: var(--mono); }
  .pub .links a { color: var(--accent); text-decoration: none; border-bottom: 1px solid var(--accent); }

  /* ---- Experience -------------------------------------------------------- */
  .exp-row { display: grid; grid-template-columns: 120px 1fr; gap: 20px; padding: 10px 0; border-bottom: 1px dotted var(--rule); }
  .exp-row .when { color: var(--muted); font-family: var(--mono); font-size: 12.5px; padding-top: 2px; }
  .exp-row .role-line { font-size: 15px; }
  .exp-row .role-line .where { font-style: italic; color: var(--fg); }
  .exp-row .note { font-size: 13.5px; color: var(--muted); margin-top: 2px; }

  /* ---- Contact ----------------------------------------------------------- */
  .contact-text { font-size: 15.5px; line-height: 1.8; max-width: 560px; text-wrap: pretty; }
  .contact-email { margin-top: 16px; font-family: var(--mono); font-size: 13.5px; color: var(--accent); }

  /* ---- Footer ------------------------------------------------------------ */
  footer.site-footer {
    margin-top: 56px; padding-top: 20px; border-top: 1px solid var(--rule);
    color: var(--muted); font-size: 12.5px; display: flex; justify-content: space-between;
    flex-wrap: wrap; gap: 8px;
  }
  footer.site-footer .updated { font-variant: small-caps; letter-spacing: 0.1em; }

  /* ---- Mobile ------------------------------------------------------------ */
  @media (max-width: 780px) {
    .site-main-grid { grid-template-columns: 1fr; gap: 32px; }
    .site-aside { display: grid; grid-template-columns: 140px 1fr; gap: 20px; align-items: start; }
    .site-portrait { width: 140px; height: 168px; }
    .aside-address { margin-top: 0; }
    .aside-links { grid-column: 1 / -1; margin-top: 4px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; }
    .site-nav { display: none; }
  }
  @media (max-width: 480px) {
    .site-aside { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="config.js"></script>
<script src="render.js"></script>
</body>
</html>
